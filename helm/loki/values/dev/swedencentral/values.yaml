# Add chart overrides for this environment/region here.
loki:
  deploymentMode: SingleBinary

  loki:
    commonConfig:
      replication_factor: 1
    storage:
      type: azure
      bucketNames:
        chunks: loki
        ruler: loki
        admin: loki
      azure:
        accountName: stcontosodevsc
        useFederatedToken: true
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: azure
          schema: v13
          index:
            prefix: index_
            period: 24h

  serviceAccount:
    create: true
    name: loki-sa
    annotations:
      azure.workload.identity/client-id: "b3e666c2-96c4-4de5-8527-4b5b1939bcb5"

  singleBinary:
    replicas: 1
    podLabels:
      azure.workload.identity/use: "true"
    persistence:
      storageClass: managed-csi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
