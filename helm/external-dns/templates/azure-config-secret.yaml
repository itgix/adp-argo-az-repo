apiVersion: v1
kind: Secret
metadata:
  name: external-dns-azure-config
  namespace: external-dns
type: Opaque
stringData:
  azure.json: |
    {
      "subscriptionId": {{ index .Values "external-dns" "azure" "subscriptionId" | quote }},
      "resourceGroup": {{ index .Values "external-dns" "azure" "resourceGroup" | quote }},
      "tenantId": {{ index .Values "external-dns" "azure" "tenantId" | quote }},
      "useWorkloadIdentityExtension": true
    }
