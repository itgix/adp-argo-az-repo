{{- if index .Values "infra-services" "enable_gatekeeper" }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    repoURL: {{ index .Values "infra-services" "gitops_destination_repo" }}
    targetRevision: {{ default "HEAD" (index .Values "infra-services" "gatekeeper_branch") }}
    path: helm/gatekeeper
    helm:
      valueFiles:
        - ../gatekeeper/values/{{ index .Values "infra-services" "environment" }}/{{ index .Values "infra-services" "region" }}/values.yaml
        - ../infra-services/values/{{ index .Values "infra-services" "environment" }}/{{ index .Values "infra-services" "region" }}/infra-facts.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gatekeeper
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: gatekeeper-validating-webhook-configuration
      jsonPointers:
        - /webhooks
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: gatekeeper-mutating-webhook-configuration
      jsonPointers:
        - /webhooks
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
  revisionHistoryLimit: 3
{{- end }}