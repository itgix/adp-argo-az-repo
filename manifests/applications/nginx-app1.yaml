apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app-1
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: nginx-app-1
    server: https://kubernetes.default.svc
  project: default
  source:
    path: manifests/deployments
    repoURL: https://dev.azure.com/ITGix/Azure%20Landing%20Zones/_git/adp-argocd-client
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true